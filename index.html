<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #1a365d;
            --accent-color: #c5a059;
            --bg-color: #f7fafc;
            --text-color: #2d3748;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: var(--primary-color);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--accent-color);
        }

        .navbar h1 {
            color: white;
            margin: 0;
            font-size: 20px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .container {
            max-width: 650px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        .profile-icon-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            background-color: #ebf8ff;
            border: 3px solid #cee8ff;
            border-radius: 50%;
            color: #3182ce;
            font-size: 40px;
            box-shadow: 0 4px 10px rgba(49, 130, 206, 0.1);
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 16px;
            transition: color 0.3s;
        }

        input[type="text"],
        input[type="password"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        input:focus, select:focus {
            background-color: #ffffff;
            border-color: #3182ce;
            outline: none;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        input:focus + i {
            color: #3182ce;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(26, 54, 93, 0.2);
        }

        .btn-submit:hover {
            background-color: #142a4a;
            transform: translateY(-1px);
        }

        #successScreen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        #successScreen .success-icon {
            font-size: 60px;
            color: #48bb78;
            margin-bottom: 20px;
        }

        #successScreen h2 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        #successScreen p {
            color: #718096;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>APPLICATION PORTAL</h1>
</div>

<div class="container" id="formContainer">
    <div class="card">
        
        <div class="profile-icon-container">
            <div class="profile-icon-wrapper">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>

        <form id="visaForm" onsubmit="handleSubmit(event)">
            
            <div class="form-group">
                <label for="txtFullName">Full Name *</label>
                <div class="input-with-icon">
                    <input type="text" id="txtFullName" placeholder="e.g. Ahmed Ali" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="txtPassNo">Passport Number *</label>
                    <div class="input-with-icon">
                        <input type="text" id="txtPassNo" placeholder="e.g. ET123456" required>
                        <i class="fas fa-passport"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="txtMobile">Mobile Number *</label>
                    <div class="input-with-icon">
                        <input type="tel" id="txtMobile" placeholder="e.g. +2519..." required>
                        <i class="fas fa-phone"></i>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="txtCompName">Company Name *</label>
                <div class="input-with-icon">
                    <input type="text" id="txtCompName" placeholder="e.g. Al-Nasr LLC" required>
                    <i class="fas fa-building"></i>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="txtJobTitle">Job Title *</label>
                    <div class="input-with-icon">
                        <input type="text" id="txtJobTitle" placeholder="e.g. Driver" required>
                        <i class="fas fa-briefcase"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="txtSalary">Monthly Salary (AED) *</label>
                    <div class="input-with-icon">
                        <input type="text" id="txtSalary" placeholder="e.g. 2500" required>
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="selEmirate">Destination Emirate *</label>
                <div class="input-with-icon">
                    <select id="selEmirate" required>
                        <option value="">-- Choose Emirate --</option>
                        <option value="Abu Dhabi">Abu Dhabi</option>
                        <option value="Dubai">Dubai</option>
                        <option value="Sharjah">Sharjah</option>
                        <option value="Ajman">Ajman</option>
                    </select>
                    <i class="fas fa-map-marker-alt"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="txtPin">Create 4-Digit Security PIN *</label>
                <div class="input-with-icon">
                    <input type="password" id="txtPin" pattern="[0-9]{4}" maxlength="4" placeholder="••••" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">SUBMIT APPLICATION</button>
        </form>
    </div>
</div>

<div class="container" id="successScreen">
    <div class="card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h2>Submission Successful!</h2>
        <p>Your data has been processed. You can track your application status using your 4-digit security PIN.</p>
        <br>
        <button class="btn-submit" onclick="window.location.reload()" style="width: auto; padding: 10px 25px;">Back to Form</button>
    </div>
</div>

<script>
    // Supabase Credentials
    const SUPABASE_URL = "https://gizealewtadele107-eng.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_P4F2VeRZUpODu0iemenxaQ_Vv3OizSV"; 

    // Initialize Supabase only if variables are provided
    let _supabase = null;
    try {
        _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch(e) {
        console.log("Supabase initialization skipped for offline testing.");
    }

    async function handleSubmit(event) {
        event.preventDefault();
        const submitBtn = document.getElementById('btnSubmit');
        submitBtn.innerText = "Processing...";
        submitBtn.disabled = true;

        const payload = {
            pin: document.getElementById('txtPin').value,
            status: 'In Process',
            full_name: document.getElementById('txtFullName').value,
            passport_number: document.getElementById('txtPassNo').value,
            company_name: document.getElementById('txtCompName').value,
            job_title: document.getElementById('txtJobTitle').value,
            monthly_salary: document.getElementById('txtSalary').value,
            emirate: document.getElementById('selEmirate').value
        };

        try {
            if (_supabase) {
                const { error: dbError } = await _supabase
                    .from('visa_applications')
                    .insert([payload]);

                if (dbError) throw dbError;
            } else {
                throw new Error("Database network client not loaded.");
            }

            // Success Screen Show
            showSuccess();

        } catch (error) {
            console.error("Database connection error: ", error.message);
            alert("Notice: Database connection offline, switching to Test Preview Mode.");
            
            // የተፈጠረውን ስህተትကျော်ፎ ቀጣዩን ገጽ ለሙከራ ያሳያል
            showSuccess();
        }
    }

    function showSuccess() {
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
    }
</script>
</body>
</html>
