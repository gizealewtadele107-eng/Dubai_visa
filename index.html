<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ireland Visa Application Demo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.header{
    text-align:center;
    border-bottom:3px solid #169b62;
    padding-bottom:15px;
}

.header h1{
    color:#169b62;
    margin:0;
}

.demo{
    background:#ffeb3b;
    padding:10px;
    margin-top:10px;
    font-weight:bold;
    text-align:center;
}

.form-group{
    margin-top:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.apply{
    background:#169b62;
    color:white;
}

.passport{
    background:#0057b8;
    color:white;
}

.footer{
    margin-top:20px;
    font-size:14px;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>IRELAND VISA APPLICATION</h1>
<p>Educational Demo Website</p>

<div class="demo"
OFFICIAL GOVERNMENT WEBSITE
</div>
</div>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Passport Number</label>
<input type="text">
</div>

<div class="form-group">
<label>Nationality</label>
<input type="text">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="form-group">
<label>Visa Type</label>
<select>
<option>Work Visa</option>
<option>Student Visa</option>
<option>Tourist Visa</option>
<option>Business Visa</option>
</select>
</div>

<div class="form-group">
<label>Email</label>
<input type="email">
</div>

<button class="passport" type="button">
Renew Passport (Demo)
</button>

<button class="passport" type="button">
New Passport Application (Demo)
</button>

<button class="apply" type="submit">
Submit Application
</button>

</form>

<div class="footer">
<p>
This website is for educational and learning purposes only.
Government of Ireland.
</p>
</div>

</div>

</body>
</html>
