<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ireland Visa Application Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #004a99; }
        .lang-btn { background: #eee; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .page { display: none; }
        .active { display: block; }
        .admin-section { margin-top: 30px; padding: 15px; background: #fff0f0; border: 1px solid #ffcccc; border-radius: 10px; color: #d00; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: right;">
        <button class="lang-btn" onclick="alert('English Mode')">EN</button>
        <button class="lang-btn" onclick="alert('አማርኛ ሁነታ')">አማርኛ</button>
    </div>

    <div class="header">
        <h1>🇮🇪 Ireland Visa</h1>
    </div>

    <!-- Page 1: Sign In -->
    <div id="page1" class="page active">
        <h3>Sign In</h3>
        <button onclick="showPage('page2')">Login with Google</button>
    </div>

    <!-- Page 2: Visa Form -->
    <div id="page2" class="page">
        <h3>Personal Details</h3>
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
        <input type="number" placeholder="Age">
        <input type="file" placeholder="Passport Photo">
        <button onclick="showPage('page3')">Next</button>
    </div>

    <!-- Page 3: Payment -->
    <div id="page3" class="page">
        <h3>Payment (12,000 ETB)</h3>
        <p>Telebirr: 0900000000</p>
        <p>CBE: 100099999999</p>
        <select>
            <option>Telebirr</option>
            <option>CBE Bank</option>
        </select>
        <button onclick="alert('Application Submitted Successfully!')">Pay & Submit</button>
    </div>

    <!-- Admin Section -->
    <div class="admin-section">
        <h4>Admin Verification</h4>
        <button style="background: #28a745;">Verify Pending Applications</button>
    </div>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }
</script>

</body>
</html>
